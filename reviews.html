            <div class="client">

                </div>
                <div class="pt2">
                    <form id="reviewForm">
                        <div id="rev1">
                            <div>
                                <label>Name</label>
                                <input type="text" name="name" class="rev-input" required>
                            </div>
                            <div>
                                <label>Rating</label>
                                <select name="rating" class="rev-input" required>
                                    <option value="5">★★★★★</option>
                                    <option value="4">★★★★</option>
                                    <option value="3">★★★</option>
                                    <option value="2">★★</option>
                                    <option value="1">★</option>
                                </select>
                            </div>
                            <div><label>Write your review</label>
                                <textarea name="review" class="rev-input" required></textarea>
                            </div>
                            <div><button type="submit">Submit Review</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
